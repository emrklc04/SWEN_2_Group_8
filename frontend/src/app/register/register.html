<div class="container">
  <div class="card">
    <h1>Tour Planner</h1>
    <p>Register</p>

    <form (ngSubmit)="register()">
      <div>
        <label>Name:</label>
        <input type="text" [(ngModel)]="name" name="name" [disabled]="loading()" />
      </div>

      <div>
        <label>Email:</label>
        <input type="email" [(ngModel)]="email" name="email" [disabled]="loading()" />
      </div>

      <div>
        <label>Password:</label>
        <input type="password" [(ngModel)]="password" name="password" [disabled]="loading()" />
      </div>

      <div>
        <label>Confirm Password:</label>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          [disabled]="loading()"
        />
      </div>

      <div
        *ngIf="message()"
        [class.error]="messageType() === 'error'"
        [class.success]="messageType() === 'success'"
        class="msg"
      >
        {{ message() }}
      </div>

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Loading...' : 'Register' }}
      </button>
    </form>
  </div>
</div>
