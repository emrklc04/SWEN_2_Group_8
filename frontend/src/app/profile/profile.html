<div class="profile-container">
  <header class="header">
    <div class="header-left">
      <div class="logo">📍</div>
      <div class="header-info">
        <h1 class="header-title">Tour Planner</h1>
        <p class="header-subtitle">Profile</p>
      </div>
    </div>
    <div class="header-right">
      <button class="back-button" (click)="backToDashboard()" title="Back to Dashboard">← Dashboard</button>
      <button class="logout-button" (click)="logout()">Logout</button>
    </div>
  </header>

  <main class="main-content">
    <div class="profile-card">
      <!-- Profile Header -->
      <div class="profile-header">
        <div class="profile-avatar">
          <img [src]="avatar()" alt="Profile Avatar" class="avatar-image">
        </div>
        <div class="profile-name-section">
          <h1 class="profile-name">{{ name() || 'Your name' }}</h1>
          <p class="profile-email">{{ email() }}</p>
        </div>
        <button
          class="edit-button"
          (click)="toggleEdit()"
          [class.editing]="isEditing()">
          {{ isEditing() ? '✓ Done' : '✎ Edit' }}
        </button>
      </div>

      <!-- Profile Info Section -->
      <div class="profile-info">
        <!-- Name Field -->
        <div class="info-field">
          <label class="field-label">Name</label>
          <div class="field-value-container" [class.editing]="isEditing()">
            <input
              *ngIf="isEditing()"
              type="text"
              class="field-input"
              [(ngModel)]="name"
              name="name"
              placeholder="Your name">
            <span *ngIf="!isEditing()" class="field-value">{{ name() || 'Not set' }}</span>
          </div>
        </div>

        <!-- Email Field -->
        <div class="info-field">
          <label class="field-label">Email account</label>
          <div class="field-value-container" [class.editing]="isEditing()">
            <input
              *ngIf="isEditing()"
              type="email"
              class="field-input"
              [(ngModel)]="email"
              name="email"
              placeholder="your@email.com">
            <span *ngIf="!isEditing()" class="field-value">{{ email() }}</span>
          </div>
        </div>

        <!-- Mobile Field -->
        <div class="info-field">
          <label class="field-label">Mobile number</label>
          <div class="field-value-container" [class.editing]="isEditing()">
            <input
              *ngIf="isEditing()"
              type="tel"
              class="field-input"
              [(ngModel)]="mobile"
              name="mobile"
              placeholder="Add number">
            <span *ngIf="!isEditing()" class="field-value">{{ mobile() || 'Add number' }}</span>
          </div>
        </div>

        <!-- Location Field -->
        <div class="info-field">
          <label class="field-label">Location</label>
          <div class="field-value-container" [class.editing]="isEditing()">
            <input
              *ngIf="isEditing()"
              type="text"
              class="field-input"
              [(ngModel)]="location"
              name="location"
              placeholder="Your location">
            <span *ngIf="!isEditing()" class="field-value">{{ location() || 'Not set' }}</span>
          </div>
        </div>

        <!-- Message Display -->
        <div class="message"
             *ngIf="message()"
             [class.success]="messageType() === 'success'"
             [class.error]="messageType() === 'error'">
          {{ message() }}
        </div>

        <!-- Action Buttons -->
        <div class="profile-actions" *ngIf="isEditing()">
          <button
            class="cancel-button"
            (click)="toggleEdit()"
            [disabled]="loading()">
            Cancel
          </button>
          <button
            class="save-button"
            (click)="saveChanges()"
            [disabled]="loading()">
            {{ loading() ? 'Saving...' : 'Save changes' }}
          </button>
        </div>
      </div>
    </div>
  </main>
</div>
